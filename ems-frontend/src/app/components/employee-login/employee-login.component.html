<div class="login-container">
  <div class="login-wrapper">
    <div class="brand-header">
      <div class="brand-icon"><mat-icon>person</mat-icon></div>
      <h1>EMS Portal</h1>
      <p>Employee Self-Service</p>
    </div>
    <mat-card class="login-card">
      <mat-card-header>
        <mat-card-title>Employee Login</mat-card-title>
        <mat-card-subtitle>Access your profile and details</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="error-alert" *ngIf="errorMessage">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email Address</mat-label>
            <input matInput type="email" formControlName="email"
                   placeholder="alice@company.com">
            <mat-icon matPrefix>email</mat-icon>
            <mat-error *ngIf="f['email'].hasError('required')">Email is required</mat-error>
            <mat-error *ngIf="f['email'].hasError('email')">Enter a valid email</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'"
                   formControlName="password">
            <mat-icon matPrefix>lock</mat-icon>
            <button mat-icon-button matSuffix type="button"
                    (click)="hidePassword = !hidePassword">
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="f['password'].hasError('required')">Password is required</mat-error>
          </mat-form-field>
          <button mat-raised-button color="accent" type="submit"
                  class="submit-btn" [disabled]="loginForm.invalid || isLoading">
            <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
            <span *ngIf="!isLoading">Login as Employee</span>
          </button>
        </form>
      </mat-card-content>
      <mat-card-footer>
        <div class="footer-links">
          <p>Are you an admin? <a routerLink="/admin/login">Admin Login</a></p>
        </div>
        <div class="demo-hint">
          <mat-icon>info</mat-icon>
          <span>Demo: alice&#64;company.com / password123</span>
        </div>
      </mat-card-footer>
    </mat-card>
  </div>
</div>
