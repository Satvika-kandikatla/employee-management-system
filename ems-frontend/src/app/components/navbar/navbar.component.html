<mat-toolbar class="navbar">
  <div class="navbar-brand">
    <mat-icon>business_center</mat-icon>
    <span>Synergy Softwares</span>
  </div>
  <span class="spacer"></span>
  <div class="navbar-actions">

    <!-- Dark Mode Toggle -->
    <button mat-icon-button
            class="theme-btn"
            (click)="toggleTheme()"
            [matTooltip]="themeService.isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
      <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <!-- User Info -->
    <div class="user-greeting">
      <mat-icon>account_circle</mat-icon>
      <span>{{ authService.getUserName() }}</span>
      <span class="role-badge" [class.admin]="authService.isAdmin()">
        {{ authService.getUser()?.role }}
      </span>
    </div>

    <!-- Menu -->
    <button mat-icon-button [matMenuTriggerFor]="userMenu" class="menu-btn">
      <mat-icon>more_vert</mat-icon>
    </button>
  </div>

  <mat-menu #userMenu="matMenu" xPosition="before">
    <button mat-menu-item routerLink="/dashboard">
      <mat-icon>dashboard</mat-icon><span>Dashboard</span>
    </button>
    <button mat-menu-item routerLink="/employees">
      <mat-icon>people</mat-icon><span>Employees</span>
    </button>
    <button mat-menu-item routerLink="/employees/add"
            *ngIf="authService.isAdmin()">
      <mat-icon>person_add</mat-icon><span>Add Employee</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="toggleTheme()">
      <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      <span>{{ themeService.isDarkMode() ? 'Light Mode' : 'Dark Mode' }}</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()">
      <mat-icon color="warn">logout</mat-icon><span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
